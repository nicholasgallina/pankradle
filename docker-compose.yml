services:
  db:
    image: postgres:16
    container_name: pankradle_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pankradle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pankradle}
      POSTGRES_DB: ${POSTGRES_DB:-pankradle}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pankradle_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data: